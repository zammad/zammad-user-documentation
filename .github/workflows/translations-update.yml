name: Translations update

on:
  pull_request_review:
    types: [submitted]

jobs:
  merge-fast-forward:
    if: github.event.pull_request.user.login == 'zammad-sync'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # We appear to need write permission for both pull-requests and
      #   issues in order to post a comment to a pull request.
      pull-requests: write
      issues: write
    steps:
      - name: Fast forward merge
        uses: sequoia-pgp/fast-forward@v1
        with:
          merge: true
          # To reduce the workflow's verbosity, we use 'on-error'
          #   to only post a comment when an error occurs.
          #   The information is still available in the step's summary.
          comment: on-error
